<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rock Paper Scissors</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet"/>
</head>
<body>

  <canvas id="bg"></canvas>

  <!-- SCREEN 1: Enter Name -->
  <div class="screen" id="screenName">
    <div class="card name-card">
      <div class="logo">✊✋✌️</div>
      <h1>Rock Paper<br/>Scissors</h1>
      <p class="tagline">Enter your name to begin</p>
      <input type="text" id="nameInput" placeholder="Your name..." maxlength="20"/>

      <div class="round-select">
        <p class="round-label">Choose Rounds</p>
        <div class="round-btns">
          <button class="round-opt active" onclick="selectRounds(3, this)">3</button>
          <button class="round-opt" onclick="selectRounds(5, this)">5</button>
          <button class="round-opt" onclick="selectRounds(7, this)">7</button>
          <button class="round-opt" onclick="selectRounds(10, this)">10</button>
        </div>
      </div>

      <button class="btn-primary" onclick="startGame()">🎮 Let's Play!</button>
      <button class="btn-ghost" onclick="showScreen('screenBoard')">🏆 Scoreboard</button>
    </div>
  </div>

  <!-- SCREEN 2: Game -->
  <div class="screen hidden" id="screenGame">
    <div class="topbar">
      <button class="back-btn" onclick="goHome()">← Home</button>
      <span class="player-tag" id="currentPlayerTag"></span>
      <button class="board-btn" onclick="showScreen('screenBoard')">🏆</button>
    </div>

    <div class="game-wrap">

      <!-- Round Counter -->
      <div class="round-counter" id="roundCounter">Round 1 of 5</div>

      <!-- Round Progress Bar -->
      <div class="progress-bar-wrap">
        <div class="progress-bar" id="progressBar"></div>
      </div>

      <div class="session-scores">
        <div class="ss-box win-box">
          <div class="ss-num" id="sessWins">0</div>
          <div class="ss-lbl">Wins</div>
        </div>
        <div class="ss-box draw-box">
          <div class="ss-num" id="sessDraws">0</div>
          <div class="ss-lbl">Draws</div>
        </div>
        <div class="ss-box lose-box">
          <div class="ss-num" id="sessLosses">0</div>
          <div class="ss-lbl">Losses</div>
        </div>
      </div>

      <div class="arena">
        <div class="fighter you-side">
          <div class="fighter-emoji" id="youEmoji">❓</div>
          <div class="fighter-label">You</div>
          <div class="fighter-name" id="youName">—</div>
        </div>
        <div class="vs-ring">VS</div>
        <div class="fighter cpu-side">
          <div class="fighter-emoji" id="cpuEmoji">🤖</div>
          <div class="fighter-label">CPU</div>
          <div class="fighter-name" id="cpuName">—</div>
        </div>
      </div>

      <div class="result-strip" id="resultStrip">Choose your weapon!</div>

      <div class="weapons" id="weaponBtns">
        <button class="weapon rock"     onclick="play('rock')"><span>✊</span><small>Rock</small></button>
        <button class="weapon paper"    onclick="play('paper')"><span>✋</span><small>Paper</small></button>
        <button class="weapon scissors" onclick="play('scissors')"><span>✌️</span><small>Scissors</small></button>
      </div>

      <!-- Play Again (hidden until game over) -->
      <button class="btn-primary" id="playAgainBtn" onclick="playAgain()" style="display:none;">
        🔄 Play Again
      </button>
      <button class="btn-ghost" id="homeAfterBtn" onclick="goHome()" style="display:none;">
        🏠 Change Player
      </button>

    </div>
  </div>

  <!-- SCREEN 3: Scoreboard -->
  <div class="screen hidden" id="screenBoard">
    <div class="board-wrap">
      <div class="board-header">
        <button class="back-btn" onclick="goHome()">← Home</button>
        <h2>🏆 Scoreboard</h2>
        <button class="reset-all-btn" onclick="resetAll()">🗑 Reset</button>
      </div>
      <div id="boardTable"></div>
    </div>
  </div>

  <div id="confetti"></div>
  <script src="game.js"></script>
</body>
</html>
